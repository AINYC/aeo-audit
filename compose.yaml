services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aeo_platform}
      POSTGRES_USER: ${POSTGRES_USER:-aeo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aeo}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aeo} -d ${POSTGRES_DB:-aeo_platform}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ainyc/aeo-platform-api run dev"
    volumes:
      - .:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: ${API_PORT:-3000}
      BOOTSTRAP_SECRET: ${BOOTSTRAP_SECRET}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  worker:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ainyc/aeo-platform-worker run dev"
    volumes:
      - .:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MAX_CONCURRENCY: ${GEMINI_MAX_CONCURRENCY:-2}
      GEMINI_MAX_REQUESTS_PER_MINUTE: ${GEMINI_MAX_REQUESTS_PER_MINUTE:-10}
      GEMINI_MAX_REQUESTS_PER_DAY: ${GEMINI_MAX_REQUESTS_PER_DAY:-1000}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @ainyc/aeo-platform-web run dev"
    volumes:
      - .:/workspace
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-3000}
    ports:
      - "${WEB_PORT:-4173}:4173"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
