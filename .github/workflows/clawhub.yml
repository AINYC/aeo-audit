name: Publish Skills to ClawHub

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'package.json'

jobs:
  publish-skills:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        skill: [aeo]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check if skill changed
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 HEAD -- "skills/${{ matrix.skill }}/" "package.json" | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.check.outputs.changed == 'true'
        with:
          node-version: 22
      - name: Install ClawHub CLI
        if: steps.check.outputs.changed == 'true'
        run: npm install -g clawhub
      - name: Publish skill
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          clawhub publish "./skills/${{ matrix.skill }}" \
            --slug "${{ matrix.skill }}" \
            --name "${{ matrix.skill }}" \
            --version "$VERSION"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
